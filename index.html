<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz - Hỗ Trợ Giáo Viên Ra Đề</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }
        .app-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-radius: 24px;
        }
        .input-focus {
            transition: all 0.3s ease;
            border: 2px solid #e2e8f0;
        }
        .input-focus:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        .btn-boost {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-boost:active {
            transform: scale(0.95);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="app-gradient p-6 mb-8 shadow-lg">
        <div class="max-w-5xl mx-auto flex justify-between items-center text-white">
            <div class="flex items-center gap-2">
                <div class="bg-white p-2 rounded-xl">
                    <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                </div>
                <span class="text-xl font-bold tracking-tight">AI QUIZ PRO</span>
            </div>
            <div class="hidden md:block text-sm font-medium opacity-90 italic">Trợ lý ra đề thi chuyên nghiệp</div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6 border-t-4 border-indigo-500">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-indigo-700">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m10 0a2 2 0 100-4m0 4a2 2 0 110-4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m-6 0H4m5.08 0h2.84m5.08 0h2.84M6.66 4h10.68"></path></svg>
                        Thiết lập đề thi
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Mã kết nối (API Key)</label>
                            <input type="password" id="apiKey" placeholder="Nhập mã từ Google Gemini..." class="w-full mt-1 p-3 rounded-xl bg-gray-50 input-focus outline-none text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-xs font-bold text-gray-500 uppercase">Khối lớp</label>
                                <select id="grade" class="w-full mt-1 p-3 rounded-xl bg-gray-50 input-focus outline-none text-sm cursor-pointer">
                                    <option>Lớp 10</option><option>Lớp 11</option><option>Lớp 12</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-gray-500 uppercase">Số câu hỏi</label>
                                <input type="number" id="count" value="10" min="1" max="40" class="w-full mt-1 p-3 rounded-xl bg-gray-50 input-focus outline-none text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Môn học</label>
                            <select id="subject" class="w-full mt-1 p-3 rounded-xl bg-gray-50 input-focus outline-none text-sm cursor-pointer">
                                <option>Toán</option><option>Ngữ văn</option><option>Ngoại ngữ</option>
                                <option>Vật lý</option><option>Hóa học</option><option>Sinh học</option>
                                <option>Lịch sử</option><option>Địa lý</option><option>Tin học</option>
                                <option>Công nghệ</option><option>GDKT & PL</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Chủ đề chi tiết</label>
                            <textarea id="topic" rows="3" placeholder="Ví dụ: Đạo hàm hàm số hợp, Các định luật bảo toàn..." class="w-full mt-1 p-3 rounded-xl bg-gray-50 input-focus outline-none text-sm"></textarea>
                        </div>
                        <button onclick="generateQuiz()" id="btnGen" class="w-full py-4 rounded-2xl app-gradient text-white font-bold shadow-lg shadow-indigo-200 btn-boost flex justify-center items-center gap-2">
                            <span>TẠO ĐỀ THI NGAY</span>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="welcomeScreen" class="glass-card p-12 text-center border-dashed border-2 border-slate-300">
                    <div class="bg-indigo-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-10 h-10 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-700">Chưa có đề thi nào</h2>
                    <p class="text-slate-500 mt-2">Điền thông tin bên trái và bấm nút để bắt đầu.</p>
                </div>
                <div id="resultArea" class="hidden animate-in fade-in duration-500">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-indigo-900" id="resultTitle">Nội dung đề thi</h2>
                        <div class="flex gap-2">
                            <button onclick="copyContent()" class="bg-white px-4 py-2 rounded-xl text-sm font-semibold shadow-sm hover:bg-gray-50 border border-slate-200">Sao chép</button>
                            <button onclick="window.print()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-semibold shadow-md">In đề thi</button>
                        </div>
                    </div>
                    <div id="quizContent" class="glass-card p-8 text-slate-800 leading-relaxed whitespace-pre-wrap min-h-[500px] text-base"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) document.getElementById('apiKey').value = savedKey;
        });

        async function generateQuiz() {
            const key = document.getElementById('apiKey').value.trim();
            const grade = document.getElementById('grade').value;
            const subject = document.getElementById('subject').value;
            const topic = document.getElementById('topic').value.trim();
            const count = document.getElementById('count').value;
            const btn = document.getElementById('btnGen');

            if(!key) { alert("Vui lòng nhập API Key Gemini để tiếp tục!"); return; }
            localStorage.setItem('gemini_api_key', key);

            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');
            const quizContent = document.getElementById('quizContent');
            quizContent.innerHTML = `<div class="flex flex-col items-center justify-center py-20 text-indigo-600">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
                <p class="font-medium">AI đang tư duy chuyên sâu môn ${subject}...</p>
            </div>`;

            btn.disabled = true;

            let subjectExpertise = "";
            switch(subject) {
                case "Toán": subjectExpertise = "tập trung vào logic giải thuật, yêu cầu các thông số trong đề bài phải chính xác và có các phương án nhiễu dễ gây nhầm lẫn."; break;
                case "Ngữ văn": subjectExpertise = "lựa chọn các đoạn trích văn học đặc sắc, yêu cầu các câu hỏi về đọc hiểu, phân tích tác phẩm và các biện pháp nghệ thuật."; break;
                case "Vật lý": case "Hóa học": subjectExpertise = "chú trọng vào bản chất hiện tượng và các câu hỏi bài tập tính toán có kèm đơn vị chuẩn."; break;
                case "Ngoại ngữ": subjectExpertise = "tập trung vào cấu trúc ngữ pháp phổ biến trong đề thi quốc gia và từ vựng theo ngữ cảnh."; break;
                default: subjectExpertise = "đảm bảo đúng chuẩn kiến thức trong sách giáo khoa hiện hành.";
            }

            const prompt = `Bạn là một chuyên gia giáo dục bậc THPT dày dạn kinh nghiệm tại Việt Nam.
Hãy soạn một đề thi chất lượng cao môn ${subject} dành cho học sinh ${grade}.
Chủ đề trọng tâm: ${topic || 'Kiến thức tổng hợp'}.
Số lượng: ${count} câu hỏi trắc nghiệm (mỗi câu 4 phương án A, B, C, D).

Yêu cầu chuyên môn:
- Bạn phải ${subjectExpertise}
- Các câu hỏi phải được phân loại theo ma trận đề: Nhận biết, Thông hiểu, Vận dụng.
- Nội dung bám sát chương trình GDPT mới (2018).

Định dạng trình bày:
1. Tiêu đề đề thi.
2. PHẦN I: ĐỀ BÀI (Câu 1, Câu 2,... nội dung rõ ràng).
3. PHẦN II: BẢNG ĐÁP ÁN VÀ GIẢI THÍCH NHANH (giúp giáo viên nắm bắt cốt lõi).`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                if (!response.ok) throw new Error("API Key không hợp lệ hoặc hết hạn mức.");

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;

                document.getElementById('resultTitle').innerText = `Kết Quả: ${subject} - ${grade}`;
                quizContent.innerText = text;
                resultArea.scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                quizContent.innerHTML = `<div class="text-red-500 text-center py-10 font-bold">Lỗi: ${error.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function copyContent() {
            const content = document.getElementById('quizContent').innerText;
            navigator.clipboard.writeText(content).then(() => alert("Đã sao chép nội dung vào bộ nhớ tạm!"));
        }
    </script>
</body>
</html>
